<VirtualHost *:80>

    DocumentRoot /var/www/html/public

    Header always unset Access-Control-Allow-Origin
    Header always unset Access-Control-Allow-Headers
    Header always unset Access-Control-Allow-Methods

    Header always set Access-Control-Allow-Origin "https://glpi-vue.vercel.app"
    Header always set Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS"
    Header always set Access-Control-Allow-Headers "Content-Type, Authorization, App-Token, Session-Token, Accept-Language"

    RewriteEngine On

    <Directory /var/www/html/public>
        AllowOverride All
        Require all granted

        RewriteCond %{REQUEST_METHOD} =OPTIONS
        RewriteRule ^ - [R=200,L]

        RewriteCond %{HTTP:Authorization} ^(.+)$
        RewriteRule .* - [E=HTTP_AUTHORIZATION:%{HTTP:Authorization}]

        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteRule ^ index.php [QSA,L]
    </Directory>

</VirtualHost>